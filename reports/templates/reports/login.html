{% extends "reports/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0" style="border-radius: 20px; background: rgba(255, 255, 255, 0.95);">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">devNector Sign In</h2>
                    <p class="text-muted">Enter your credentials to access the system</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2 shadow-sm">Login to Dashboard</button>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center mt-4 text-muted small">© 2026 devNector Reporting System. All rights reserved.</p>
    </div>
</div>
{% endblock %}
